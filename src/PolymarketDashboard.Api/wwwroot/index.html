<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polymarket Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #58a6ff;
      --yes:         #3fb950;
      --yes-bg:      #0d2719;
      --no:          #f85149;
      --no-bg:       #2d0f0f;
      --other:       #d29922;
      --other-bg:    #2e1f00;
      --green:       #3fb950;
      --red:         #f85149;
      --radius:      10px;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .logo { display: flex; align-items: center; gap: 0.5rem; }
    .logo svg { flex-shrink: 0; }

    h1 { font-size: 1.15rem; font-weight: 600; color: var(--text); white-space: nowrap; }

    .search-wrap { flex: 1; min-width: 180px; max-width: 480px; position: relative; }

    .search-wrap svg {
      position: absolute; left: 0.65rem; top: 50%;
      transform: translateY(-50%); color: var(--text-muted); pointer-events: none;
    }

    #search {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.875rem;
      padding: 0.45rem 0.75rem 0.45rem 2.1rem; outline: none; transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    .meta { margin-left: auto; font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }

    /* ── Tabs ─────────────────────────────────────────────────────── */
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 1.5rem; background: var(--bg); }

    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); cursor: pointer; font-size: 0.875rem; font-weight: 500;
      padding: 0.65rem 1rem; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Main ─────────────────────────────────────────────────────── */
    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── State messages ───────────────────────────────────────────── */
    .state-msg {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.75rem; min-height: 320px; color: var(--text-muted); font-size: 1rem;
    }

    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .err-icon { font-size: 2rem; }

    /* ── Markets grid ─────────────────────────────────────────────── */
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

    /* ── Market card ──────────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.1rem 1.2rem; display: flex; flex-direction: column; gap: 0.85rem;
      cursor: pointer; transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .card-question {
      font-size: 0.9rem; font-weight: 500; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .outcomes { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .outcome {
      display: flex; align-items: center; gap: 0.35rem; border-radius: 5px;
      padding: 0.25rem 0.55rem; font-size: 0.8rem; font-weight: 600; border: 1px solid transparent;
    }

    .outcome.yes   { background: var(--yes-bg);   color: var(--yes);   border-color: #1a4a2a; }
    .outcome.no    { background: var(--no-bg);    color: var(--no);    border-color: #5a1a1a; }
    .outcome.other { background: var(--other-bg); color: var(--other); border-color: #5a3a00; }
    .outcome-label { opacity: 0.85; font-weight: 500; }
    .outcome-price { font-weight: 700; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem 0.75rem; margin-top: auto; }
    .stat { display: flex; flex-direction: column; gap: 0.1rem; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .stat-value { font-size: 0.85rem; font-weight: 600; }
    .stat.end-date { grid-column: span 2; }

    /* ── Detail overlay ───────────────────────────────────────────── */
    #detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
    }

    #detail-overlay.open { display: block; }

    #detail-panel {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: min(820px, 100vw); background: var(--bg);
      border-left: 1px solid var(--border); overflow-y: auto;
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.25s ease;
    }

    #detail-overlay.open #detail-panel { transform: translateX(0); }

    .detail-header {
      position: sticky; top: 0; z-index: 5;
      background: rgba(13,17,23,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border); padding: 1rem 1.25rem;
      display: flex; align-items: flex-start; gap: 0.75rem;
    }

    .detail-back {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-muted); cursor: pointer; font-size: 0.8rem;
      padding: 0.35rem 0.7rem; flex-shrink: 0; transition: color 0.15s, border-color 0.15s;
    }

    .detail-back:hover { color: var(--text); border-color: var(--text-muted); }

    .detail-title { font-size: 1rem; font-weight: 600; line-height: 1.4; }

    .detail-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Key stats grid ───────────────────────────────────────────── */
    .detail-stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }

    .detail-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1rem;
    }

    .detail-stat .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .detail-stat .stat-value { font-size: 1rem; font-weight: 700; margin-top: 0.2rem; }

    /* ── Price change chips ───────────────────────────────────────── */
    .price-changes { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .pc-chip {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.3rem 0.65rem; font-size: 0.8rem; display: flex; gap: 0.4rem; align-items: center;
    }

    .pc-chip .pc-label { color: var(--text-muted); }
    .pc-chip .pc-val { font-weight: 700; }

    .section-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 0.6rem;
    }

    /* ── Chart ────────────────────────────────────────────────────── */
    #price-chart { width: 100%; height: 280px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }

    .chart-loading {
      height: 280px; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.875rem;
      border: 1px solid var(--border); border-radius: var(--radius); gap: 0.6rem;
    }

    /* ── Order book ───────────────────────────────────────────────── */
    .ob-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .ob-side { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .ob-side-header {
      padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
    }

    .ob-bids .ob-side-header { color: var(--green); }
    .ob-asks .ob-side-header { color: var(--red); }

    .ob-row {
      display: grid; grid-template-columns: 1fr 1fr;
      padding: 0.35rem 0.75rem; font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      position: relative;
    }

    .ob-row:last-child { border-bottom: none; }

    .ob-bar { position: absolute; inset: 0; opacity: 0.08; }
    .ob-bids .ob-bar { background: var(--green); }
    .ob-asks .ob-bar { background: var(--red); }

    .ob-price { font-weight: 600; position: relative; }
    .ob-size  { text-align: right; color: var(--text-muted); position: relative; }
    .ob-bids .ob-price { color: var(--green); }
    .ob-asks .ob-price { color: var(--red); }

    /* ── Description ──────────────────────────────────────────────── */
    .detail-desc {
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.65; white-space: pre-wrap;
      border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem;
      background: var(--surface); max-height: 200px; overflow-y: auto;
    }

    /* ── Portfolio ────────────────────────────────────────────────── */
    .portfolio-summary { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }

    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.9rem 1.2rem; min-width: 140px;
    }

    .summary-card .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .summary-card .stat-value { font-size: 1.15rem; font-weight: 700; margin-top: 0.15rem; }

    .pos-table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    thead th {
      background: var(--surface2); color: var(--text-muted); font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; padding: 0.65rem 1rem;
      text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 0.75rem 1rem; vertical-align: middle; }

    .pos-market { display: flex; align-items: center; gap: 0.6rem; max-width: 420px; cursor: pointer; }
    .pos-market:hover .pos-title { color: var(--accent); }

    .pos-icon { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface2); }

    .pos-title {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.4; font-weight: 500; transition: color 0.15s;
    }

    .pos-outcome { display: inline-block; border-radius: 4px; padding: 0.2rem 0.5rem; font-size: 0.75rem; font-weight: 700; }
    .pos-outcome.yes   { background: var(--yes-bg); color: var(--yes); }
    .pos-outcome.no    { background: var(--no-bg);  color: var(--no);  }
    .pos-outcome.other { background: var(--other-bg); color: var(--other); }

    .pnl-pos  { color: var(--green); }
    .pnl-neg  { color: var(--red); }
    .pnl-zero { color: var(--text-muted); }

    .redeemable-badge {
      background: #1a3a1a; color: var(--green); border: 1px solid #2a5a2a;
      border-radius: 4px; font-size: 0.7rem; padding: 0.15rem 0.4rem; font-weight: 600;
    }

    @media (max-width: 600px) {
      header { padding: 0.75rem 1rem; }
      .tabs  { padding: 0 1rem; }
      main   { padding: 1rem; }
      #grid  { grid-template-columns: 1fr; }
      .ob-wrap { grid-template-columns: 1fr; }
      .detail-stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
    </svg>
    <h1>Polymarket Dashboard</h1>
  </div>

  <div class="search-wrap" id="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="search" type="search" placeholder="Search markets…" autocomplete="off" />
  </div>

  <span class="meta" id="meta"></span>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="markets">Markets</button>
  <button class="tab-btn" data-tab="portfolio">Portfolio</button>
</nav>

<main>
  <div class="tab-panel active" id="tab-markets">
    <div id="markets-container">
      <div class="state-msg"><div class="spinner"></div><span>Loading markets…</span></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-portfolio">
    <div id="portfolio-container">
      <div class="state-msg"><div class="spinner"></div><span>Loading portfolio…</span></div>
    </div>
  </div>
</main>

<!-- ── Market detail slide-in panel ──────────────────────────────── -->
<div id="detail-overlay">
  <div id="detail-panel">
    <div class="detail-header">
      <button class="detail-back" id="detail-back">← Back</button>
      <p class="detail-title" id="detail-title"></p>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let allMarkets      = [];
let activeTab       = 'markets';
let portfolioLoaded = false;
let currentChart    = null;

// ── Helpers ────────────────────────────────────────────────────────────────

function escHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function parseArray(val) {
  if (Array.isArray(val)) return val;
  if (typeof val === 'string') { try { return JSON.parse(val); } catch { return []; } }
  return [];
}

function fmtDollar(val) {
  if (val === null || val === undefined || val === '') return '—';
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  if (n >= 1_000_000) return '$' + (n / 1_000_000).toFixed(2) + 'M';
  if (n >= 1_000)     return '$' + (n / 1_000).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}

function fmtDate(val) {
  if (!val) return '—';
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function outcomeClass(label) {
  const l = (label || '').toLowerCase();
  if (l === 'yes') return 'yes';
  if (l === 'no')  return 'no';
  return 'other';
}

function pnlClass(val) {
  if (val > 0) return 'pnl-pos';
  if (val < 0) return 'pnl-neg';
  return 'pnl-zero';
}

function fmtPnl(val) {
  if (val === null || val === undefined) return '—';
  const n = parseFloat(val);
  if (isNaN(n)) return '—';
  return (n > 0 ? '+' : '') + '$' + n.toFixed(2);
}

function fmtChange(val) {
  if (val === null || val === undefined) return { text: '—', cls: 'pnl-zero' };
  const n = parseFloat(val);
  if (isNaN(n)) return { text: '—', cls: 'pnl-zero' };
  const pct = (n * 100).toFixed(1);
  return { text: (n > 0 ? '+' : '') + pct + '%', cls: n > 0 ? 'pnl-pos' : n < 0 ? 'pnl-neg' : 'pnl-zero' };
}

// ── Tabs ───────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    activeTab = tab;
    document.getElementById('search-wrap').style.display = tab === 'markets' ? '' : 'none';
    document.getElementById('meta').textContent = '';
    if (tab === 'portfolio' && !portfolioLoaded) fetchPortfolio();
  });
});

// ── Market cards ───────────────────────────────────────────────────────────

function buildCard(m) {
  const outcomes      = parseArray(m.outcomes);
  const outcomePrices = parseArray(m.outcomePrices);
  const outcomesHtml  = outcomes.map((label, i) => {
    const raw   = outcomePrices[i];
    const price = raw !== undefined ? (parseFloat(raw) * 100).toFixed(1) + '%' : '—';
    return `<span class="outcome ${outcomeClass(label)}">
              <span class="outcome-label">${escHtml(label)}</span>
              <span class="outcome-price">${price}</span>
            </span>`;
  }).join('');

  return `<article class="card" data-id="${escHtml(m.id)}">
    <p class="card-question">${escHtml(m.question)}</p>
    <div class="outcomes">${outcomesHtml || '<span style="color:var(--text-muted);font-size:.8rem">No outcome data</span>'}</div>
    <div class="stats">
      <div class="stat"><span class="stat-label">Volume</span><span class="stat-value">${fmtDollar(m.volume)}</span></div>
      <div class="stat"><span class="stat-label">Liquidity</span><span class="stat-value">${fmtDollar(m.liquidity)}</span></div>
      <div class="stat end-date"><span class="stat-label">End Date</span><span class="stat-value">${fmtDate(m.endDate)}</span></div>
    </div>
  </article>`;
}

function renderGrid(markets) {
  const container = document.getElementById('markets-container');
  const metaEl    = document.getElementById('meta');
  if (!markets.length) {
    container.innerHTML = `<div class="state-msg"><span class="err-icon">🔍</span><span>No markets match your search.</span></div>`;
    metaEl.textContent = '';
    return;
  }
  const grid = document.createElement('div');
  grid.id = 'grid';
  grid.innerHTML = markets.map(buildCard).join('');
  grid.addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const m = allMarkets.find(x => x.id === card.dataset.id);
    if (m) openDetail(m);
  });
  container.innerHTML = '';
  container.appendChild(grid);
  metaEl.textContent = `${markets.length} market${markets.length === 1 ? '' : 's'}`;
}

function renderMarketsError(msg) {
  document.getElementById('markets-container').innerHTML =
    `<div class="state-msg"><span class="err-icon">⚠️</span><span>${escHtml(msg)}</span></div>`;
}

// ── Detail panel ───────────────────────────────────────────────────────────

const overlay     = document.getElementById('detail-overlay');
const detailTitle = document.getElementById('detail-title');
const detailBody  = document.getElementById('detail-body');

document.getElementById('detail-back').addEventListener('click', closeDetail);
overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

function closeDetail() {
  overlay.classList.remove('open');
  if (currentChart) { currentChart.remove(); currentChart = null; }
}

async function openDetail(m) {
  if (currentChart) { currentChart.remove(); currentChart = null; }
  detailTitle.textContent = m.question;
  detailBody.innerHTML    = buildDetailBody(m);
  overlay.classList.add('open');

  const tokenIds   = parseArray(m.clobTokenIds);
  const yesTokenId = tokenIds[0] ?? '';

  await Promise.all([
    m.conditionId ? loadChart(m.conditionId) : Promise.resolve(),
    yesTokenId    ? loadOrderBook(yesTokenId) : Promise.resolve(),
  ]);
}

function buildDetailBody(m) {
  const outcomes      = parseArray(m.outcomes);
  const outcomePrices = parseArray(m.outcomePrices);
  const outcomesHtml  = outcomes.map((label, i) => {
    const raw   = outcomePrices[i];
    const price = raw !== undefined ? (parseFloat(raw) * 100).toFixed(1) + '%' : '—';
    return `<span class="outcome ${outcomeClass(label)}">
              <span class="outcome-label">${escHtml(label)}</span>
              <span class="outcome-price">${price}</span>
            </span>`;
  }).join('');

  const changes = [
    { label: '1h',  val: m.oneHourPriceChange  },
    { label: '1d',  val: m.oneDayPriceChange   },
    { label: '1w',  val: m.oneWeekPriceChange  },
    { label: '1mo', val: m.oneMonthPriceChange },
    { label: '1y',  val: m.oneYearPriceChange  },
  ].filter(c => c.val !== null && c.val !== undefined);

  const changesHtml = changes.map(c => {
    const { text, cls } = fmtChange(c.val);
    return `<div class="pc-chip"><span class="pc-label">${c.label}</span><span class="pc-val ${cls}">${text}</span></div>`;
  }).join('');

  const descHtml = m.description
    ? `<div><p class="section-title">Resolution criteria</p><div class="detail-desc">${escHtml(m.description)}</div></div>`
    : '';

  return `
    <div class="outcomes">${outcomesHtml}</div>

    <div class="detail-stats-row">
      <div class="detail-stat"><div class="stat-label">Best Bid</div>
        <div class="stat-value">${m.bestBid != null ? (m.bestBid * 100).toFixed(1) + '¢' : '—'}</div></div>
      <div class="detail-stat"><div class="stat-label">Best Ask</div>
        <div class="stat-value">${m.bestAsk != null ? (m.bestAsk * 100).toFixed(1) + '¢' : '—'}</div></div>
      <div class="detail-stat"><div class="stat-label">Spread</div>
        <div class="stat-value">${m.spread != null ? (m.spread * 100).toFixed(2) + '¢' : '—'}</div></div>
      <div class="detail-stat"><div class="stat-label">Last Trade</div>
        <div class="stat-value">${m.lastTradePrice != null ? (m.lastTradePrice * 100).toFixed(1) + '¢' : '—'}</div></div>
      <div class="detail-stat"><div class="stat-label">Liquidity</div>
        <div class="stat-value">${fmtDollar(m.liquidity)}</div></div>
      <div class="detail-stat"><div class="stat-label">Vol (all time)</div>
        <div class="stat-value">${fmtDollar(m.volume)}</div></div>
      <div class="detail-stat"><div class="stat-label">Vol 24h</div>
        <div class="stat-value">${fmtDollar(m.volume24hr)}</div></div>
      <div class="detail-stat"><div class="stat-label">Vol 7d</div>
        <div class="stat-value">${fmtDollar(m.volume1wk)}</div></div>
      <div class="detail-stat"><div class="stat-label">Vol 30d</div>
        <div class="stat-value">${fmtDollar(m.volume1mo)}</div></div>
      <div class="detail-stat"><div class="stat-label">End Date</div>
        <div class="stat-value">${fmtDate(m.endDate)}</div></div>
    </div>

    ${changesHtml ? `<div><p class="section-title">Price change (Yes outcome)</p>
      <div class="price-changes">${changesHtml}</div></div>` : ''}

    <div>
      <p class="section-title">Price history (Yes outcome)</p>
      <div id="chart-container">
        <div class="chart-loading"><div class="spinner"></div><span>Loading chart…</span></div>
      </div>
    </div>

    <div>
      <p class="section-title">Order book (Yes outcome · top 10 levels)</p>
      <div id="ob-container">
        <div class="chart-loading"><div class="spinner"></div><span>Loading order book…</span></div>
      </div>
    </div>

    ${descHtml}`;
}

async function loadChart(conditionId) {
  const container = document.getElementById('chart-container');
  if (!container) return;
  try {
    const res = await fetch(`/api/market-detail/history?conditionId=${encodeURIComponent(conditionId)}`);
    if (!res.ok) throw new Error(res.status);
    const points = await res.json();

    if (!points.length) {
      container.innerHTML = '<div class="chart-loading">No price history available.</div>';
      return;
    }

    container.innerHTML = '<div id="price-chart"></div>';
    const chartEl = document.getElementById('price-chart');

    currentChart = LightweightCharts.createChart(chartEl, {
      layout:    { background: { color: '#0d1117' }, textColor: '#8b949e' },
      grid:      { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#30363d' },
      timeScale:       { borderColor: '#30363d', timeVisible: true },
      width:  chartEl.clientWidth,
      height: 280,
    });

    const series = currentChart.addAreaSeries({
      lineColor:   '#58a6ff',
      topColor:    'rgba(88,166,255,0.25)',
      bottomColor: 'rgba(88,166,255,0)',
      lineWidth:   2,
      priceFormat: { type: 'custom', formatter: v => v.toFixed(1) + '¢', minMove: 0.1 },
    });

    const data = points
      .map(p => ({ time: p.t, value: parseFloat((p.p * 100).toFixed(2)) }))
      .sort((a, b) => a.time - b.time);

    series.setData(data);
    currentChart.timeScale().fitContent();

    new ResizeObserver(() => {
      if (currentChart) currentChart.applyOptions({ width: chartEl.clientWidth });
    }).observe(chartEl);

  } catch {
    container.innerHTML = '<div class="chart-loading" style="color:var(--red)">Could not load price history.</div>';
  }
}

async function loadOrderBook(tokenId) {
  const container = document.getElementById('ob-container');
  if (!container) return;
  try {
    const res = await fetch(`/api/market-detail/orderbook?tokenId=${encodeURIComponent(tokenId)}`);
    if (!res.ok) throw new Error(res.status);
    const book = await res.json();

    const bids = (book.bids || []).slice(0, 10).sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
    const asks = (book.asks || []).slice(0, 10).sort((a, b) => parseFloat(a.price) - parseFloat(b.price));

    if (!bids.length && !asks.length) {
      container.innerHTML = '<div class="chart-loading">No order book data available.</div>';
      return;
    }

    const maxBid = Math.max(...bids.map(r => parseFloat(r.size) || 0), 1);
    const maxAsk = Math.max(...asks.map(r => parseFloat(r.size) || 0), 1);

    const mkRows = (rows, max) => rows.map(r => {
      const pct = ((parseFloat(r.size) / max) * 100).toFixed(1);
      return `<div class="ob-row">
        <div class="ob-bar" style="width:${pct}%"></div>
        <span class="ob-price">${(parseFloat(r.price) * 100).toFixed(1)}¢</span>
        <span class="ob-size">${parseFloat(r.size).toFixed(0)}</span>
      </div>`;
    }).join('') || '<div style="padding:.5rem .75rem;color:var(--text-muted);font-size:.8rem">None</div>';

    container.innerHTML = `
      <div class="ob-wrap">
        <div class="ob-side ob-bids">
          <div class="ob-side-header">Bids (Buy Yes)</div>${mkRows(bids, maxBid)}
        </div>
        <div class="ob-side ob-asks">
          <div class="ob-side-header">Asks (Sell Yes)</div>${mkRows(asks, maxAsk)}
        </div>
      </div>`;
  } catch {
    container.innerHTML = '<div class="chart-loading" style="color:var(--red)">Could not load order book.</div>';
  }
}

// ── Portfolio ──────────────────────────────────────────────────────────────

function renderPortfolio(positions) {
  const container = document.getElementById('portfolio-container');
  if (!positions.length) {
    container.innerHTML = `<div class="state-msg"><span class="err-icon">💼</span><span>No open positions found for this wallet.</span></div>`;
    return;
  }

  const totalValue   = positions.reduce((s, p) => s + (p.currentValue || 0), 0);
  const totalCashPnl = positions.reduce((s, p) => s + (p.cashPnl      || 0), 0);
  const totalBought  = positions.reduce((s, p) => s + (p.totalBought  || 0), 0);
  const redeemCount  = positions.filter(p => p.redeemable).length;

  const rows = positions.map(p => {
    const cls  = outcomeClass(p.outcome);
    const icon = p.icon ? `<img class="pos-icon" src="${escHtml(p.icon)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
    const titleCell = `<span class="pos-market" data-condition-id="${escHtml(p.conditionId)}" data-slug="${escHtml(p.slug)}">${icon}<span class="pos-title">${escHtml(p.title)}</span></span>`;
    const redeem = p.redeemable ? '<span class="redeemable-badge">Redeem</span>' : '';
    return `<tr>
      <td>${titleCell}</td>
      <td><span class="pos-outcome ${cls}">${escHtml(p.outcome)}</span></td>
      <td>${p.size.toFixed(2)}</td>
      <td>${p.avgPrice > 0 ? (p.avgPrice * 100).toFixed(1) + '¢' : '—'}</td>
      <td>${(p.curPrice * 100).toFixed(1)}¢</td>
      <td>${fmtDollar(p.currentValue)}</td>
      <td class="${pnlClass(p.cashPnl)}">${fmtPnl(p.cashPnl)}</td>
      <td>${fmtDate(p.endDate)}</td>
      <td>${redeem}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="portfolio-summary">
      <div class="summary-card"><div class="stat-label">Open Positions</div><div class="stat-value">${positions.length}</div></div>
      <div class="summary-card"><div class="stat-label">Current Value</div><div class="stat-value">${fmtDollar(totalValue)}</div></div>
      <div class="summary-card"><div class="stat-label">Total Invested</div><div class="stat-value">${fmtDollar(totalBought)}</div></div>
      <div class="summary-card"><div class="stat-label">Unrealised P&amp;L</div><div class="stat-value ${pnlClass(totalCashPnl)}">${fmtPnl(totalCashPnl)}</div></div>
      ${redeemCount > 0 ? `<div class="summary-card"><div class="stat-label">Redeemable</div><div class="stat-value pnl-pos">${redeemCount}</div></div>` : ''}
    </div>
    <div class="pos-table-wrap">
      <table>
        <thead><tr>
          <th>Market</th><th>Side</th><th>Shares</th><th>Avg Price</th>
          <th>Cur Price</th><th>Value</th><th>P&amp;L</th><th>End Date</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  container.addEventListener('click', async e => {
    const cell = e.target.closest('[data-condition-id]');
    if (!cell) return;
    const conditionId = cell.dataset.conditionId;
    const slug        = cell.dataset.slug;

    // Try cached markets first (match by conditionId), otherwise fetch from Gamma by slug
    let m = allMarkets.find(x => x.conditionId === conditionId);
    if (!m) {
      try {
        const param = slug
          ? `slug=${encodeURIComponent(slug)}`
          : `conditionId=${encodeURIComponent(conditionId)}`;
        const res = await fetch(`/api/market-detail/market?${param}`);
        if (res.ok) m = await res.json();
      } catch { /* fall through */ }
    }
    if (m) openDetail(m);
  });
}

function renderPortfolioError(msg) {
  document.getElementById('portfolio-container').innerHTML =
    `<div class="state-msg"><span class="err-icon">⚠️</span><span>${escHtml(msg)}</span></div>`;
}

// ── Search ─────────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  renderGrid(q ? allMarkets.filter(m => (m.question || '').toLowerCase().includes(q)) : allMarkets);
});

// ── Fetch ──────────────────────────────────────────────────────────────────

async function fetchMarkets() {
  try {
    const res = await fetch('/api/markets');
    if (!res.ok) throw new Error(`${res.status}`);
    allMarkets = await res.json();
    renderGrid(allMarkets);
  } catch {
    renderMarketsError('Could not load markets. Is the API server running?');
  }
}

async function fetchPortfolio() {
  try {
    const res = await fetch('/api/portfolio');
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || `Server returned ${res.status}`);
    }
    portfolioLoaded = true;
    renderPortfolio(await res.json());
  } catch (err) {
    renderPortfolioError(err.message || 'Could not load portfolio.');
  }
}

fetchMarkets();
</script>
