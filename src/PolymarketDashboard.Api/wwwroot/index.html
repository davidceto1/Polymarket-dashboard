<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polymarket Dashboard</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #58a6ff;
      --yes:         #3fb950;
      --yes-bg:      #0d2719;
      --no:          #f85149;
      --no-bg:       #2d0f0f;
      --other:       #d29922;
      --other-bg:    #2e1f00;
      --radius:      10px;
      --green:       #3fb950;
      --red:         #f85149;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo svg { flex-shrink: 0; }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 180px;
      max-width: 480px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.875rem;
      padding: 0.45rem 0.75rem 0.45rem 2.1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    .meta {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Tabs ─────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      background: var(--bg);
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.65rem 1rem;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Main ─────────────────────────────────────────────────────── */
    main {
      padding: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── State messages ───────────────────────────────────────────── */
    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      min-height: 320px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .err-icon { font-size: 2rem; }

    /* ── Markets Grid ─────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    /* ── Card ─────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-question {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Outcome badges ───────────────────────────────────────────── */
    .outcomes {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .outcome {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 5px;
      padding: 0.25rem 0.55rem;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .outcome.yes  { background: var(--yes-bg);   color: var(--yes);   border-color: #1a4a2a; }
    .outcome.no   { background: var(--no-bg);    color: var(--no);    border-color: #5a1a1a; }
    .outcome.other{ background: var(--other-bg); color: var(--other); border-color: #5a3a00; }

    .outcome-label { opacity: 0.85; font-weight: 500; }
    .outcome-price { font-weight: 700; }

    /* ── Stats row ────────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem 0.75rem;
      margin-top: auto;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat.end-date { grid-column: span 2; }

    /* ── Portfolio table ──────────────────────────────────────────── */
    .portfolio-summary {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.2rem;
      min-width: 140px;
    }

    .summary-card .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .summary-card .stat-value { font-size: 1.15rem; font-weight: 700; margin-top: 0.15rem; }

    .pos-table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.65rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 0.75rem 1rem;
      vertical-align: middle;
    }

    .pos-market {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      max-width: 420px;
    }

    .pos-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .pos-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
      font-weight: 500;
    }

    .pos-outcome {
      display: inline-block;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .pos-outcome.yes   { background: var(--yes-bg);   color: var(--yes); }
    .pos-outcome.no    { background: var(--no-bg);    color: var(--no);  }
    .pos-outcome.other { background: var(--other-bg); color: var(--other); }

    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }
    .pnl-zero { color: var(--text-muted); }

    .redeemable-badge {
      background: #1a3a1a;
      color: var(--green);
      border: 1px solid #2a5a2a;
      border-radius: 4px;
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      font-weight: 600;
    }

    /* ── Responsive tweaks ────────────────────────────────────────── */
    @media (max-width: 500px) {
      header { padding: 0.75rem 1rem; }
      .tabs  { padding: 0 1rem; }
      main   { padding: 1rem; }
      #grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
    </svg>
    <h1>Polymarket Dashboard</h1>
  </div>

  <div class="search-wrap" id="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="search" type="search" placeholder="Search markets…" autocomplete="off" />
  </div>

  <span class="meta" id="meta"></span>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="markets">Markets</button>
  <button class="tab-btn" data-tab="portfolio">Portfolio</button>
</nav>

<main>
  <!-- Markets tab -->
  <div class="tab-panel active" id="tab-markets">
    <div id="markets-container">
      <div class="state-msg" id="markets-loading">
        <div class="spinner"></div>
        <span>Loading markets…</span>
      </div>
    </div>
  </div>

  <!-- Portfolio tab -->
  <div class="tab-panel" id="tab-portfolio">
    <div id="portfolio-container">
      <div class="state-msg" id="portfolio-loading">
        <div class="spinner"></div>
        <span>Loading portfolio…</span>
      </div>
    </div>
  </div>
</main>

<script>
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────────
  let allMarkets  = [];
  let activeTab   = 'markets';
  let portfolioLoaded = false;

  // ── Helpers ────────────────────────────────────────────────────────────────

  function escHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function parseArray(val) {
    if (Array.isArray(val)) return val;
    if (typeof val === 'string') {
      try { return JSON.parse(val); } catch { return []; }
    }
    return [];
  }

  function fmtDollar(val) {
    if (val === null || val === undefined || val === '') return '—';
    const n = parseFloat(val);
    if (isNaN(n)) return '—';
    if (n >= 1_000_000) return '$' + (n / 1_000_000).toFixed(2) + 'M';
    if (n >= 1_000)     return '$' + (n / 1_000).toFixed(1) + 'K';
    return '$' + n.toFixed(2);
  }

  function fmtDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (isNaN(d)) return val;
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function outcomeClass(label) {
    const l = (label || '').toLowerCase();
    if (l === 'yes') return 'yes';
    if (l === 'no')  return 'no';
    return 'other';
  }

  function pnlClass(val) {
    if (val > 0)  return 'pnl-pos';
    if (val < 0)  return 'pnl-neg';
    return 'pnl-zero';
  }

  function fmtPnl(val) {
    if (val === null || val === undefined) return '—';
    const n = parseFloat(val);
    if (isNaN(n)) return '—';
    const sign = n > 0 ? '+' : '';
    return sign + '$' + n.toFixed(2);
  }

  function fmtPct(val) {
    if (val === null || val === undefined) return '—';
    const n = parseFloat(val);
    if (isNaN(n)) return '—';
    const sign = n > 0 ? '+' : '';
    return sign + (n * 100).toFixed(1) + '%';
  }

  // ── Tab switching ──────────────────────────────────────────────────────────

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      if (tab === activeTab) return;

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
      activeTab = tab;

      document.getElementById('search-wrap').style.display = tab === 'markets' ? '' : 'none';
      document.getElementById('meta').textContent = '';

      if (tab === 'portfolio' && !portfolioLoaded) {
        fetchPortfolio();
      }
    });
  });

  // ── Market card rendering ──────────────────────────────────────────────────

  function buildCard(m) {
    const outcomes      = parseArray(m.outcomes);
    const outcomePrices = parseArray(m.outcomePrices);

    const outcomesHtml = outcomes.map((label, i) => {
      const raw   = outcomePrices[i];
      const price = (raw !== undefined && raw !== null && raw !== '')
        ? (parseFloat(raw) * 100).toFixed(1) + '%'
        : '—';
      const cls = outcomeClass(label);
      return `<span class="outcome ${cls}">
                <span class="outcome-label">${escHtml(label)}</span>
                <span class="outcome-price">${price}</span>
              </span>`;
    }).join('');

    return `<article class="card">
      <p class="card-question">${escHtml(m.question)}</p>
      <div class="outcomes">${outcomesHtml || '<span style="color:var(--text-muted);font-size:.8rem">No outcome data</span>'}</div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Volume</span>
          <span class="stat-value">${fmtDollar(m.volume)}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Liquidity</span>
          <span class="stat-value">${fmtDollar(m.liquidity)}</span>
        </div>
        <div class="stat end-date">
          <span class="stat-label">End Date</span>
          <span class="stat-value">${fmtDate(m.endDate)}</span>
        </div>
      </div>
    </article>`;
  }

  function renderGrid(markets) {
    const container = document.getElementById('markets-container');
    const metaEl    = document.getElementById('meta');

    if (!markets.length) {
      container.innerHTML = `<div class="state-msg">
        <span class="err-icon">🔍</span>
        <span>No markets match your search.</span>
      </div>`;
      metaEl.textContent = '';
      return;
    }

    const grid = document.createElement('div');
    grid.id = 'grid';
    grid.innerHTML = markets.map(buildCard).join('');

    container.innerHTML = '';
    container.appendChild(grid);
    metaEl.textContent = `${markets.length} market${markets.length === 1 ? '' : 's'}`;
  }

  function renderMarketsError(msg) {
    document.getElementById('markets-container').innerHTML = `<div class="state-msg">
      <span class="err-icon">⚠️</span>
      <span>${escHtml(msg)}</span>
    </div>`;
  }

  // ── Portfolio rendering ────────────────────────────────────────────────────

  function renderPortfolio(positions) {
    const container = document.getElementById('portfolio-container');

    if (!positions.length) {
      container.innerHTML = `<div class="state-msg">
        <span class="err-icon">💼</span>
        <span>No open positions found for this wallet.</span>
      </div>`;
      return;
    }

    const totalValue   = positions.reduce((s, p) => s + (p.currentValue  || 0), 0);
    const totalCashPnl = positions.reduce((s, p) => s + (p.cashPnl       || 0), 0);
    const totalBought  = positions.reduce((s, p) => s + (p.totalBought   || 0), 0);
    const redeemCount  = positions.filter(p => p.redeemable).length;

    const summaryHtml = `
      <div class="portfolio-summary">
        <div class="summary-card">
          <div class="stat-label">Open Positions</div>
          <div class="stat-value">${positions.length}</div>
        </div>
        <div class="summary-card">
          <div class="stat-label">Current Value</div>
          <div class="stat-value">${fmtDollar(totalValue)}</div>
        </div>
        <div class="summary-card">
          <div class="stat-label">Total Invested</div>
          <div class="stat-value">${fmtDollar(totalBought)}</div>
        </div>
        <div class="summary-card">
          <div class="stat-label">Unrealised P&amp;L</div>
          <div class="stat-value ${pnlClass(totalCashPnl)}">${fmtPnl(totalCashPnl)}</div>
        </div>
        ${redeemCount > 0 ? `<div class="summary-card">
          <div class="stat-label">Redeemable</div>
          <div class="stat-value pnl-pos">${redeemCount}</div>
        </div>` : ''}
      </div>`;

    const rows = positions.map(p => {
      const cls      = outcomeClass(p.outcome);
      const iconHtml = p.icon
        ? `<img class="pos-icon" src="${escHtml(p.icon)}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : '';
      const redeemHtml = p.redeemable ? '<span class="redeemable-badge">Redeem</span>' : '';

      return `<tr>
        <td>
          <div class="pos-market">
            ${iconHtml}
            <span class="pos-title">${escHtml(p.title)}</span>
          </div>
        </td>
        <td><span class="pos-outcome ${cls}">${escHtml(p.outcome)}</span></td>
        <td>${p.size.toFixed(2)}</td>
        <td>${p.avgPrice > 0 ? (p.avgPrice * 100).toFixed(1) + '¢' : '—'}</td>
        <td>${(p.curPrice * 100).toFixed(1)}¢</td>
        <td>${fmtDollar(p.currentValue)}</td>
        <td class="${pnlClass(p.cashPnl)}">${fmtPnl(p.cashPnl)}</td>
        <td>${fmtDate(p.endDate)}</td>
        <td>${redeemHtml}</td>
      </tr>`;
    }).join('');

    container.innerHTML = summaryHtml + `
      <div class="pos-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Market</th>
              <th>Side</th>
              <th>Shares</th>
              <th>Avg Price</th>
              <th>Cur Price</th>
              <th>Value</th>
              <th>P&amp;L</th>
              <th>End Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderPortfolioError(msg) {
    document.getElementById('portfolio-container').innerHTML = `<div class="state-msg">
      <span class="err-icon">⚠️</span>
      <span>${escHtml(msg)}</span>
    </div>`;
  }

  // ── Search ─────────────────────────────────────────────────────────────────

  document.getElementById('search').addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    renderGrid(q
      ? allMarkets.filter(m => (m.question || '').toLowerCase().includes(q))
      : allMarkets);
  });

  // ── Data fetching ──────────────────────────────────────────────────────────

  async function fetchMarkets() {
    try {
      const res = await fetch('/api/markets');
      if (!res.ok) throw new Error(`Server returned ${res.status} ${res.statusText}`);
      allMarkets = await res.json();
      renderGrid(allMarkets);
    } catch (err) {
      console.error('Failed to load markets:', err);
      renderMarketsError('Could not load markets. Is the API server running?');
    }
  }

  async function fetchPortfolio() {
    try {
      const res = await fetch('/api/portfolio');
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `Server returned ${res.status}`);
      }
      const positions = await res.json();
      portfolioLoaded = true;
      renderPortfolio(positions);
    } catch (err) {
      console.error('Failed to load portfolio:', err);
      renderPortfolioError(err.message || 'Could not load portfolio.');
    }
  }

  fetchMarkets();
</script>

</body>
</html>
